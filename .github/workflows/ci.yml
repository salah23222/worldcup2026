name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Uses only the GitHub-owned actions/checkout + the PHP preinstalled on
# ubuntu-latest. No third-party actions, so it runs even when the repo's
# Actions policy restricts actions to GitHub-authored ones.
jobs:
  php-lint:
    name: PHP syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show PHP version
        run: php -v

      - name: Lint all PHP files
        run: |
          err=0
          while IFS= read -r f; do
            if ! php -l "$f" > /dev/null 2>&1; then
              echo "::error file=$f::PHP syntax error"
              php -l "$f" || true
              err=1
            fi
          done < <(find . -name '*.php' -not -path './vendor/*' -not -path './.git/*')
          if [ "$err" -eq 0 ]; then echo "All PHP files passed php -l"; fi
          exit $err
